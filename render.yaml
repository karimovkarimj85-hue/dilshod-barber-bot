databases:
  - name: dilshod-db
    plan: free
    databaseName: dilshod_booking

services:
  - type: web
    name: dilshod-barber-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot_booking.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_IDS
        value: "645037780"
      - key: CHANNEL_ID
        value: "-1003719062121"
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DATABASE_URL
        fromDatabase:
          name: dilshod-db
          property: connectionString
    healthCheckPath: /health
