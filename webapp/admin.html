<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Дильшод — Панель</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#000000;
  --surface:rgba(255,255,255,.04);
  --card:rgba(12,12,12,.65);
  --card2:rgba(18,18,18,.72);
  --border:rgba(255,255,255,.1);
  --border2:rgba(255,255,255,.14);
  --text:#fafafa;--text2:#d4d4d8;
  --dim:#737373;--dim2:#525252;
  --accent:#ffffff;--accent2:#e5e5e5;--accent-dim:rgba(255,255,255,.08);
  --status-ok:rgba(255,255,255,.88);
  --status-warn:rgba(251,191,36,.95);
  --status-muted:rgba(255,255,255,.45);
  --green:#4ade80;--green-dim:rgba(74,222,128,.12);
  --red:#f87171;--red-dim:rgba(248,113,113,.12);
  --orange:#fbbf24;--orange-dim:rgba(251,191,36,.12);
  --r:16px;--r2:12px;
  --shadow:0 12px 48px rgba(0,0,0,.65);
}
html{min-height:100%;background:#030306}
html,body{min-height:100%;font-family:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,sans-serif;
  color:var(--text);-webkit-tap-highlight-color:transparent;
  -webkit-font-smoothing:antialiased}
body{background:transparent;position:relative;padding-bottom:env(safe-area-inset-bottom,20px)}

.chrome-backdrop{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background:#030306;overflow:hidden;
}
.line-waves-root{position:absolute;inset:0;width:100%;height:100%;opacity:1}

.screen{display:none;padding:20px;max-width:480px;margin:0 auto;animation:fadeUp .35s cubic-bezier(.16,1,.3,1);
  position:relative;z-index:1}
.screen.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

h2{
  font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;margin-bottom:22px;
  display:flex;align-items:center;letter-spacing:-.02em;color:#fafafa;
}
h2::before{
  content:'';display:inline-block;width:20px;height:2px;border-radius:2px;
  background:linear-gradient(90deg,#fff,rgba(255,255,255,.15));margin-right:10px;
}

.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px}
@media(min-width:520px){.stats{grid-template-columns:repeat(3,1fr)}}
.stat-card{
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.12);border-radius:var(--r);
  padding:16px;text-align:center;box-shadow:var(--shadow);transition:all .2s;
  -webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);
}
.stat-card .num{
  font-size:30px;font-weight:800;
  background:linear-gradient(180deg,#fff 0%,#a3a3a3 100%);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
}
.stat-card .lbl{font-size:11px;color:var(--dim);margin-top:6px;font-weight:600;text-transform:uppercase;letter-spacing:.4px}

.section-title{
  font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:600;margin:22px 0 12px;
  display:flex;align-items:center;color:#e5e5e5;letter-spacing:.02em;
}
.section-title::before{
  content:'';display:inline-block;width:16px;height:2px;border-radius:2px;
  background:linear-gradient(90deg,#fff,rgba(255,255,255,.12));margin-right:8px;
}

.cal-scroll{display:flex;gap:10px;overflow-x:auto;padding:4px 0 12px;
  -webkit-overflow-scrolling:touch;scrollbar-width:none}
.cal-scroll::-webkit-scrollbar{display:none}
.day-card{
  flex:0 0 auto;width:64px;padding:11px 0;border-radius:var(--r);text-align:center;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);cursor:pointer;
  transition:all .25s;box-shadow:var(--shadow);
  -webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);
}
.day-card:active{transform:scale(.95)}
.day-card.off{opacity:.3;pointer-events:none}
.day-card.sel{
  border-color:rgba(255,255,255,.45);background:rgba(255,255,255,.1);
  box-shadow:0 0 28px rgba(255,255,255,.1);
}
.day-card .wd{font-size:10px;color:var(--dim);font-weight:600;text-transform:uppercase}
.day-card .dd{font-size:20px;font-weight:800;margin:2px 0}
.day-card .mo{font-size:10px;color:var(--dim)}

.tabs{
  display:flex;gap:6px;margin-bottom:18px;border-radius:var(--r);padding:5px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(255,255,255,.04);
  -webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);
}
.tab{
  flex:1;padding:11px 8px;text-align:center;font-size:12px;font-weight:700;cursor:pointer;
  color:var(--dim);transition:all .25s;border-radius:calc(var(--r) - 3px);
  text-transform:uppercase;letter-spacing:.35px;
}
.tab.active{
  background:#fff;color:#000;
  box-shadow:0 4px 20px rgba(255,255,255,.12);
}
.tab:active{opacity:.85}

.booking-item{
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:var(--r);
  padding:14px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;
  box-shadow:var(--shadow);transition:all .2s;
  -webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);
}
.bi-info .bi-time{font-weight:800;font-size:15px;color:#fafafa}
.bi-info .bi-name{font-size:13px;margin-top:4px;font-weight:600}
.bi-info .bi-phone{font-size:12px;color:var(--dim);margin-top:2px}
.bi-actions{display:flex;gap:8px}
.bi-btn{
  width:40px;height:40px;border:none;border-radius:var(--r2);font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .2s;
}
.bi-btn:active{transform:scale(.9)}
.bi-btn.cancel{background:var(--red-dim);color:var(--red);border:1px solid rgba(248,113,113,.18)}

.slot-row{display:grid;grid-template-columns:58px 1fr 72px;gap:10px;align-items:center;
  padding:12px 0;border-bottom:1px solid rgba(255,255,255,.08)}
.slot-row:last-child{border-bottom:none}
.sr-time{font-weight:800;font-size:14px;color:#fafafa}
.sr-status{font-size:13px;font-weight:600}
.sr-status.free{color:var(--status-ok)}
.sr-status.booked{color:var(--red)}
.sr-status.blocked{color:var(--status-warn)}
.sr-status.past{color:var(--status-muted)}
.sr-action button{
  width:100%;padding:10px 8px;border:none;border-radius:var(--r2);
  font-size:11px;font-weight:700;cursor:pointer;transition:all .2s;
  text-transform:uppercase;letter-spacing:.04em;
}
.sr-action button:active{transform:scale(.95)}
.sr-action .block-btn{
  background:rgba(255,255,255,.08);color:#fafafa;border:1px solid rgba(255,255,255,.28);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.12);
}
.sr-action .unblock-btn{
  background:rgba(255,255,255,.1);color:#fafafa;border:1px solid rgba(255,255,255,.32);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.14);
}

.empty{text-align:center;padding:40px 0;color:var(--dim);font-size:14px;font-weight:500}
.loader{display:flex;justify-content:center;padding:36px 0}
.loader::after{content:'';width:30px;height:30px;border:3px solid rgba(255,255,255,.12);
  border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.toast{position:fixed;bottom:24px;left:20px;right:20px;padding:16px 20px;border-radius:var(--r);
  font-size:14px;font-weight:600;z-index:999;transform:translateY(120px);opacity:0;
  transition:all .35s cubic-bezier(.16,1,.3,1);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
.toast.show{transform:none;opacity:1}
.toast.ok{
  background:rgba(255,255,255,.1);color:#e5e5e5;border:1px solid rgba(255,255,255,.22);
  box-shadow:0 8px 32px rgba(0,0,0,.25);
}
.toast.err{
  background:rgba(248,113,113,.1);color:var(--red);border:1px solid rgba(248,113,113,.22);
  box-shadow:0 8px 32px rgba(248,113,113,.08);
}

.gate-msg{
  min-height:100vh;display:flex;align-items:center;justify-content:center;padding:28px;
  text-align:center;font-family:'Space Grotesk',sans-serif;font-size:17px;font-weight:600;
  color:var(--text2);line-height:1.5;
}

</style>
</head>
<body>
<div class="chrome-backdrop" aria-hidden="true"><div id="line-waves-root" class="line-waves-root"></div></div>
<script type="module" src="line-waves-bg.mjs"></script>

<div id="s-main" class="screen active">
  <h2>Панель управления</h2>

  <div class="stats" id="stats-grid">
    <div class="stat-card"><div class="num" id="st-today">—</div><div class="lbl">Сегодня записей</div></div>
    <div class="stat-card"><div class="num" id="st-tomorrow">—</div><div class="lbl">Завтра записей</div></div>
    <div class="stat-card"><div class="num" id="st-rev-day">—</div><div class="lbl">Доход сегодня</div></div>
    <div class="stat-card"><div class="num" id="st-rev-week">—</div><div class="lbl">Доход неделя</div></div>
    <div class="stat-card"><div class="num" id="st-rev-month">—</div><div class="lbl">Доход месяц</div></div>
    <div class="stat-card"><div class="num" id="st-total">—</div><div class="lbl">Всего записей</div></div>
    <div class="stat-card"><div class="num" id="st-clients">—</div><div class="lbl">Клиентов</div></div>
  </div>
  <div class="section-title" id="top-s-title" style="display:none">Популярные услуги</div>
  <div id="top-s" class="booking-item" style="display:none;flex-direction:column;align-items:stretch;text-align:left"></div>

  <div class="section-title">Выберите день</div>
  <div class="cal-scroll" id="admin-cal"></div>

  <div class="tabs" id="view-tabs" style="display:none">
    <div class="tab active" onclick="switchTab('bookings')">Записи</div>
    <div class="tab" onclick="switchTab('slots')">Слоты</div>
  </div>

  <div id="view-bookings"></div>
  <div id="view-slots" style="display:none"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const tg = window.Telegram?.WebApp;

if (!tg || !tg.initData) {
  document.body.innerHTML = '<p class="gate-msg">Откройте админку через Telegram</p>';
  throw new Error("No initData");
}

tg.ready();
tg.expand();

const initData = tg.initData;

const API = (() => {
  const p = new URLSearchParams(location.search).get('api');
  if (p) return p.replace(/\/+$/, '');
  return location.origin;
})();

const WD = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
const MO = ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];

let selectedDate = new Date().toISOString().split('T')[0];
let currentTab = 'bookings';

function toast(msg, ok = true) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + (ok ? 'ok' : 'err') + ' show';
  setTimeout(() => t.classList.remove('show'), 3500);
}

function showError(code) {
  const map = {
    missing_init_data: 'Откройте через бота /admin',
    bad_hash: 'Ошибка токена',
    not_admin: 'Нет доступа — только для администратора',
    network_error: 'Ошибка сети'
  };
  toast(map[code] || 'Ошибка', false);
}

async function api(path, opts = {}) {
  const headers = {
    'Content-Type': 'application/json',
    'X-Init-Data': initData
  };
  try {
    const r = await fetch(API + path, {...opts, headers});
    if (!r.ok) {
      console.error('HTTP error', r.status, path);
      showError('network_error');
      return null;
    }
    const data = await r.json();
    if (!data.ok) {
      console.error('API error', data.error, path);
      showError(data.error || 'unknown');
      return null;
    }
    return data;
  } catch(e) {
    console.error('Fetch failed', path, e);
    showError('network_error');
    return null;
  }
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', (i === 0 && tab === 'bookings') || (i === 1 && tab === 'slots'));
  });
  document.getElementById('view-bookings').style.display = tab === 'bookings' ? '' : 'none';
  document.getElementById('view-slots').style.display = tab === 'slots' ? '' : 'none';
}

function fmtSum(n) {
  if (n == null) return '—';
  return (n).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ' ') + ' с';
}

async function loadStats() {
  const s = await api('/api/admin/stats');
  if (!s) return false;
  document.getElementById('st-today').textContent = s.today;
  document.getElementById('st-tomorrow').textContent = s.tomorrow;
  document.getElementById('st-total').textContent = s.total;
  document.getElementById('st-clients').textContent = s.clients;
  const rd = document.getElementById('st-rev-day');
  const rw = document.getElementById('st-rev-week');
  const rm = document.getElementById('st-rev-month');
  if (rd) rd.textContent = fmtSum(s.revenue_day);
  if (rw) rw.textContent = fmtSum(s.revenue_week);
  if (rm) rm.textContent = fmtSum(s.revenue_month);
  const top = s.top_services || [];
  const ts = document.getElementById('top-s');
  const tst = document.getElementById('top-s-title');
  if (top.length && ts && tst) {
    tst.style.display = '';
    ts.style.display = '';
    ts.innerHTML = top.map(t => `<div style="padding:6px 0;border-bottom:1px solid var(--border)">${t.name} · <b>${t.count}</b></div>`).join('');
  } else if (ts) ts.style.display = 'none';
  return true;
}

async function loadCalendar() {
  const el = document.getElementById('admin-cal');
  el.innerHTML = '<div class="loader"></div>';
  const data = await api('/api/calendar');
  if (!data) { el.innerHTML = '<div class="empty">Ошибка загрузки календаря</div>'; return; }
  el.innerHTML = '';
  (data.days || []).forEach(d => {
    const dt = new Date(d.date + 'T00:00:00');
    const card = document.createElement('div');
    card.className = 'day-card' + (d.off ? ' off' : '') + (d.date === selectedDate ? ' sel' : '');
    card.innerHTML =
      `<div class="wd">${WD[d.weekday]}</div>` +
      `<div class="dd">${dt.getDate()}</div>` +
      `<div class="mo">${MO[dt.getMonth()]}</div>`;
    if (!d.off) {
      card.onclick = () => {
        selectedDate = d.date;
        el.querySelectorAll('.day-card').forEach(c => c.classList.remove('sel'));
        card.classList.add('sel');
        loadDayData();
      };
    }
    el.appendChild(card);
  });
}

async function loadDayData() {
  document.getElementById('view-tabs').style.display = '';
  const bkEl = document.getElementById('view-bookings');
  const slEl = document.getElementById('view-slots');
  bkEl.innerHTML = '<div class="loader"></div>';
  slEl.innerHTML = '<div class="loader"></div>';

  const data = await api('/api/admin/bookings?date=' + selectedDate);
  if (!data) {
    bkEl.innerHTML = '<div class="empty">Не удалось загрузить</div>';
    slEl.innerHTML = '';
    return;
  }

  bkEl.innerHTML = '';
  const bookings = data.bookings || [];
  if (!bookings.length) {
    bkEl.innerHTML = '<div class="empty">Нет записей на этот день</div>';
  } else {
    bookings.forEach(b => {
      const item = document.createElement('div');
      item.className = 'booking-item';
      const et = b.end_time ? ` – ${b.end_time}` : '';
      const sl = b.services_line ? `<div style="font-size:12px;color:var(--dim);margin-top:4px">${b.services_line}</div>` : '';
      item.innerHTML =
        `<div class="bi-info">` +
          `<div class="bi-time">${b.book_time}${et} · ${b.total_price ? (b.total_price+'').replace(/\B(?=(\d{3})+(?!\d))/g,' ') : '—'} сум</div>` +
          `<div class="bi-name">${b.name || b.ufn || '—'} ${b.username ? '@' + b.username : ''}</div>` +
          `<div class="bi-phone">${b.phone || '—'}</div>` +
          sl +
        `</div>` +
        `<div class="bi-actions">` +
          `<button class="bi-btn cancel" onclick="adminCancel(${b.id})" title="Отменить">✕</button>` +
        `</div>`;
      bkEl.appendChild(item);
    });
  }

  slEl.innerHTML = '';
  const slots = data.slots || [];
  if (!slots.length) {
    slEl.innerHTML = '<div class="empty">Выходной</div>';
  } else {
    slots.forEach(s => {
      const row = document.createElement('div');
      row.className = 'slot-row';
      const statusText = ({free:'Свободно',booked:'Занято',blocked:'Заблок.',past:'Прошло'})[s.status] || s.status;
      let actionHtml = '';
      if (s.status === 'free')
        actionHtml = `<button class="block-btn" onclick="blockSlot('${selectedDate}','${s.time}')">Block</button>`;
      else if (s.status === 'blocked')
        actionHtml = `<button class="unblock-btn" onclick="unblockSlot('${selectedDate}','${s.time}')">Unblock</button>`;
      row.innerHTML =
        `<div class="sr-time">${s.time}</div>` +
        `<div class="sr-status ${s.status}">${statusText}</div>` +
        `<div class="sr-action">${actionHtml}</div>`;
      slEl.appendChild(row);
    });
  }
}

async function adminCancel(bid) {
  if (!confirm('Отменить эту запись?')) return;
  const res = await api('/api/admin/cancel', {method:'POST',body:JSON.stringify({booking_id:bid})});
  if (res) { toast('Запись отменена'); loadDayData(); loadStats(); }
}

async function blockSlot(d, t) {
  const res = await api('/api/admin/block', {method:'POST',body:JSON.stringify({date:d,time:t})});
  if (res) { toast('Слот заблокирован'); loadDayData(); }
}

async function unblockSlot(d, t) {
  const res = await api('/api/admin/unblock', {method:'POST',body:JSON.stringify({date:d,time:t})});
  if (res) { toast('Слот разблокирован'); loadDayData(); }
}

(async () => {
  loadCalendar();
  const ok = await loadStats();
  if (ok) loadDayData();
})();
</script>
</body>
</html>
