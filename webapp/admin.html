<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Дильшод — Панель</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#050505;--surface:#0c0c0c;--card:#111;--card2:#161616;
  --border:rgba(255,255,255,.06);--border2:rgba(255,255,255,.1);
  --text:#f0f0f0;--text2:#c8c8c8;--dim:#666;--dim2:#444;
  --accent:#c9a96e;--accent2:#e8c88a;--accent-dim:rgba(201,169,110,.15);
  --green:#34d399;--green-dim:rgba(52,211,153,.12);
  --red:#f87171;--red-dim:rgba(248,113,113,.12);
  --orange:#fbbf24;--orange-dim:rgba(251,191,36,.12);
  --r:16px;--r2:12px;
  --shadow:0 4px 24px rgba(0,0,0,.4);
}
html,body{min-height:100%;font-family:'SF Pro Display',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,sans-serif;
  background:var(--bg);color:var(--text);-webkit-tap-highlight-color:transparent;
  -webkit-font-smoothing:antialiased}

.screen{display:none;padding:20px;max-width:480px;margin:0 auto;animation:fadeUp .35s cubic-bezier(.16,1,.3,1)}
.screen.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

h2{font-size:20px;font-weight:800;margin-bottom:20px;display:flex;align-items:center;gap:10px;
  letter-spacing:-.3px}

/* ── Stats ── */
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px}
.stat-card{background:var(--card2);border:1px solid var(--border2);border-radius:var(--r);
  padding:16px;text-align:center;box-shadow:var(--shadow);transition:all .2s}
.stat-card .num{font-size:32px;font-weight:800;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat-card .lbl{font-size:12px;color:var(--dim);margin-top:4px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}

/* ── Calendar ── */
.section-title{font-size:14px;font-weight:700;margin:20px 0 10px;color:var(--dim);
  text-transform:uppercase;letter-spacing:.5px}
.cal-scroll{display:flex;gap:10px;overflow-x:auto;padding:4px 0 12px;scrollbar-width:none}
.cal-scroll::-webkit-scrollbar{display:none}
.day-card{flex:0 0 auto;width:62px;padding:10px 0;border-radius:var(--r);text-align:center;
  background:var(--card2);border:1px solid var(--border);cursor:pointer;
  transition:all .25s;box-shadow:var(--shadow)}
.day-card:active{transform:scale(.95)}
.day-card.off{opacity:.3;pointer-events:none}
.day-card.sel{border-color:var(--accent);background:var(--accent-dim);
  box-shadow:0 0 20px rgba(201,169,110,.15)}
.day-card .wd{font-size:10px;color:var(--dim);font-weight:600;text-transform:uppercase}
.day-card .dd{font-size:20px;font-weight:800;margin:2px 0}
.day-card .mo{font-size:10px;color:var(--dim)}

/* ── Tabs ── */
.tabs{display:flex;gap:0;margin-bottom:18px;border-radius:var(--r);overflow:hidden;
  border:1px solid var(--border2);background:var(--card)}
.tab{flex:1;padding:12px;text-align:center;font-size:13px;font-weight:700;cursor:pointer;
  color:var(--dim);transition:all .25s;text-transform:uppercase;letter-spacing:.5px}
.tab.active{background:linear-gradient(135deg,var(--accent),#a88542);color:var(--bg)}
.tab:active{opacity:.7}

/* ── Booking item ── */
.booking-item{background:var(--card2);border:1px solid var(--border2);border-radius:var(--r);
  padding:14px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;
  box-shadow:var(--shadow);transition:all .2s}
.bi-info .bi-time{font-weight:800;font-size:16px;color:var(--accent)}
.bi-info .bi-name{font-size:13px;margin-top:3px;font-weight:600}
.bi-info .bi-phone{font-size:12px;color:var(--dim);margin-top:1px}
.bi-actions{display:flex;gap:8px}
.bi-btn{width:40px;height:40px;border:none;border-radius:var(--r2);font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .2s}
.bi-btn:active{transform:scale(.9)}
.bi-btn.cancel{background:var(--red-dim);color:var(--red);border:1px solid rgba(248,113,113,.15)}

/* ── Slot rows ── */
.slot-row{display:grid;grid-template-columns:60px 1fr 64px;gap:10px;align-items:center;
  padding:12px 0;border-bottom:1px solid var(--border)}
.slot-row:last-child{border-bottom:none}
.sr-time{font-weight:800;font-size:14px}
.sr-status{font-size:13px;font-weight:600}
.sr-status.free{color:var(--green)}
.sr-status.booked{color:var(--red)}
.sr-status.blocked{color:var(--orange)}
.sr-status.past{color:var(--dim2)}
.sr-action button{width:100%;padding:10px;border:none;border-radius:var(--r2);
  font-size:12px;font-weight:700;cursor:pointer;transition:all .2s}
.sr-action button:active{transform:scale(.95)}
.sr-action .block-btn{background:var(--orange-dim);color:var(--orange);border:1px solid rgba(251,191,36,.15)}
.sr-action .unblock-btn{background:var(--green-dim);color:var(--green);border:1px solid rgba(52,211,153,.15)}

.empty{text-align:center;padding:40px 0;color:var(--dim);font-size:14px;font-weight:500}
.loader{display:flex;justify-content:center;padding:36px 0}
.loader::after{content:'';width:28px;height:28px;border:3px solid var(--border2);
  border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.toast{position:fixed;bottom:24px;left:20px;right:20px;padding:16px 20px;border-radius:var(--r);
  font-size:14px;font-weight:600;z-index:999;transform:translateY(120px);opacity:0;
  transition:all .35s cubic-bezier(.16,1,.3,1);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
.toast.show{transform:none;opacity:1}
.toast.ok{background:rgba(52,211,153,.12);color:var(--green);border:1px solid rgba(52,211,153,.2)}
.toast.err{background:rgba(248,113,113,.12);color:var(--red);border:1px solid rgba(248,113,113,.2)}
</style>
</head>
<body>

<div id="s-main" class="screen active">
  <h2>👑 Панель управления</h2>

  <div class="stats" id="stats-grid">
    <div class="stat-card"><div class="num" id="st-today">—</div><div class="lbl">Сегодня</div></div>
    <div class="stat-card"><div class="num" id="st-tomorrow">—</div><div class="lbl">Завтра</div></div>
    <div class="stat-card"><div class="num" id="st-total">—</div><div class="lbl">Всего</div></div>
    <div class="stat-card"><div class="num" id="st-clients">—</div><div class="lbl">Клиентов</div></div>
  </div>

  <div class="section-title">Выберите день</div>
  <div class="cal-scroll" id="admin-cal"></div>

  <div class="tabs" id="view-tabs" style="display:none">
    <div class="tab active" onclick="switchTab('bookings')">Записи</div>
    <div class="tab" onclick="switchTab('slots')">Слоты</div>
  </div>

  <div id="view-bookings"></div>
  <div id="view-slots" style="display:none"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const tg = window.Telegram && Telegram.WebApp;
if (tg) { tg.ready(); tg.expand(); }

const API = (() => {
  const p = new URLSearchParams(location.search).get('api');
  if (p) return p.replace(/\/+$/, '');
  return location.origin;
})();
const initData = tg ? tg.initData : '';

const WD = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
const MO = ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];

let selectedDate = new Date().toISOString().split('T')[0];
let currentTab = 'bookings';

function toast(msg, ok = true) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + (ok ? 'ok' : 'err') + ' show';
  setTimeout(() => t.classList.remove('show'), 3000);
}

async function api(path, opts = {}) {
  const headers = {'Content-Type': 'application/json'};
  if (initData) headers['X-Init-Data'] = initData;
  const r = await fetch(API + path, {...opts, headers});
  const data = await r.json();
  if (r.status === 401) toast('Авторизация: откройте из бота /admin', false);
  if (r.status === 403) toast('Нет доступа — только для администратора', false);
  return data;
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', (i === 0 && tab === 'bookings') || (i === 1 && tab === 'slots'));
  });
  document.getElementById('view-bookings').style.display = tab === 'bookings' ? '' : 'none';
  document.getElementById('view-slots').style.display = tab === 'slots' ? '' : 'none';
}

async function loadStats() {
  try {
    const s = await api('/api/admin/stats');
    document.getElementById('st-today').textContent = s.today;
    document.getElementById('st-tomorrow').textContent = s.tomorrow;
    document.getElementById('st-total').textContent = s.total;
    document.getElementById('st-clients').textContent = s.clients;
  } catch(e) {}
}

async function loadCalendar() {
  const el = document.getElementById('admin-cal');
  try {
    const data = await api('/api/calendar');
    el.innerHTML = '';
    data.days.forEach(d => {
      const dt = new Date(d.date + 'T00:00:00');
      const card = document.createElement('div');
      card.className = 'day-card' + (d.off ? ' off' : '') + (d.date === selectedDate ? ' sel' : '');
      card.innerHTML =
        `<div class="wd">${WD[d.weekday]}</div>` +
        `<div class="dd">${dt.getDate()}</div>` +
        `<div class="mo">${MO[dt.getMonth()]}</div>`;
      if (!d.off) {
        card.onclick = () => {
          selectedDate = d.date;
          el.querySelectorAll('.day-card').forEach(c => c.classList.remove('sel'));
          card.classList.add('sel');
          loadDayData();
        };
      }
      el.appendChild(card);
    });
  } catch(e) { el.innerHTML = '<div class="empty">Ошибка</div>'; }
}

async function loadDayData() {
  document.getElementById('view-tabs').style.display = '';
  const bkEl = document.getElementById('view-bookings');
  const slEl = document.getElementById('view-slots');
  bkEl.innerHTML = '<div class="loader"></div>';
  slEl.innerHTML = '<div class="loader"></div>';
  try {
    const data = await api('/api/admin/bookings?date=' + selectedDate);
    bkEl.innerHTML = '';
    if (!data.bookings.length) {
      bkEl.innerHTML = '<div class="empty">Нет записей на этот день</div>';
    } else {
      data.bookings.forEach(b => {
        const item = document.createElement('div');
        item.className = 'booking-item';
        item.innerHTML =
          `<div class="bi-info">` +
            `<div class="bi-time">${b.book_time}</div>` +
            `<div class="bi-name">${b.name || b.ufn || '—'} ${b.username ? '@' + b.username : ''}</div>` +
            `<div class="bi-phone">${b.phone || '—'}</div>` +
          `</div>` +
          `<div class="bi-actions">` +
            `<button class="bi-btn cancel" onclick="adminCancel(${b.id})" title="Отменить">✕</button>` +
          `</div>`;
        bkEl.appendChild(item);
      });
    }
    slEl.innerHTML = '';
    if (!data.slots.length) {
      slEl.innerHTML = '<div class="empty">Выходной</div>';
    } else {
      data.slots.forEach(s => {
        const row = document.createElement('div');
        row.className = 'slot-row';
        const statusText = {free:'Свободно',booked:'Занято',blocked:'Заблок.',past:'Прошло'}[s.status] || s.status;
        let actionHtml = '';
        if (s.status === 'free')
          actionHtml = `<button class="block-btn" onclick="blockSlot('${selectedDate}','${s.time}')">🔒</button>`;
        else if (s.status === 'blocked')
          actionHtml = `<button class="unblock-btn" onclick="unblockSlot('${selectedDate}','${s.time}')">🔓</button>`;
        row.innerHTML =
          `<div class="sr-time">${s.time}</div>` +
          `<div class="sr-status ${s.status}">${statusText}</div>` +
          `<div class="sr-action">${actionHtml}</div>`;
        slEl.appendChild(row);
      });
    }
  } catch(e) { bkEl.innerHTML = '<div class="empty">Ошибка загрузки</div>'; }
}

async function adminCancel(bid) {
  if (!confirm('Отменить эту запись?')) return;
  const res = await api('/api/admin/cancel', {method:'POST',body:JSON.stringify({booking_id:bid})});
  if (res.ok) { toast('Запись отменена'); loadDayData(); loadStats(); }
  else toast('Ошибка', false);
}

async function blockSlot(d, t) {
  await api('/api/admin/block', {method:'POST',body:JSON.stringify({date:d,time:t})});
  toast('Слот заблокирован'); loadDayData();
}

async function unblockSlot(d, t) {
  await api('/api/admin/unblock', {method:'POST',body:JSON.stringify({date:d,time:t})});
  toast('Слот разблокирован'); loadDayData();
}

loadStats();
loadCalendar();
loadDayData();
</script>
</body>
</html>
